server:
  port: 8091

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/gateway/auth/**
          filters:
            - StripPrefix=2

        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/gateway/product/**
          filters:
            - StripPrefix=2

        - id: order-service
          uri: http://order-service:8084
          predicates:
            - Path=/gateway/order/**
          filters:
            - StripPrefix=2

        - id: notification-service
          uri: http://notification-service:8083
          predicates:
            - Path=/gateway/notification/**
          filters:
            - StripPrefix=2

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: "*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Product Service
        url: /gateway/product/v3/api-docs
      - name: Auth Service
        url: /gateway/auth/v3/api-docs
      - name: Order Service
        url: /gateway/order/v3/api-docs
      - name: Notification Service
        url: /gateway/notification/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true  # ← оставляем, это работает
  info:
    gateway:
      enabled: true  # ← ДОБАВЬТЕ ЭТУ СТРОКУ

logging:
  level:
    org.springframework.cloud.gateway: INFO