# Server
spring.application.name=order-service
server.port=8084

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.kranker.productservice.dto.kafka
spring.kafka.consumer.properties.spring.json.value.default.type=com.kranker.productservice.dto.kafka.ProductCreatedEvent

# Feign Client
product.service.url=http://localhost:8082

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus