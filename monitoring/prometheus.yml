global:
  scrape_interval: 15s

scrape_configs:
  # Auth Service
  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']

  # Product Service
  - job_name: 'product-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']

  # Kafka JMX Exporter
  - job_name: 'kafka-jmx'
    static_configs:
      - targets: ['kafka:9999']
    metrics_path: /metrics
    scrape_interval: 10s